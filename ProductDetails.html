<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <section class="max-w-7xl mx-auto px-6 py-12 grid grid-cols-1 md:grid-cols-2 gap-12">
        <div class="flex gap-4">
            <div class="flex gap-4">
                <div class="flex flex-col gap-2 w-20" id="sideGallery">
                </div>
                <div class="flex-1 rounded-xl overflow-hidden bg-gray-50">
                    <img id="mainImage" src="" class="w-full h-full object-cover">
                </div>
            </div>
        </div>

        <div class="space-y-6">
            <div>
                <p id="prodBrand" class="text-gray-400 text-sm uppercase tracking-widest"></p>
                <h1 id="prodName" class="text-4xl font-bold mt-2"></h1>
                <div class="flex items-center gap-4 mt-2">
                    <div class="text-yellow-400 text-sm">★★★★☆ <span id="prodReviews" class="text-gray-400"></span>
                    </div>
                    <div class="bg-red-100 text-red-600 px-2 py-1 rounded text-xs font-bold uppercase">Discount</div>
                </div>
            </div>

            <div class="flex items-baseline gap-4">
                <span id="prodPrice" class="text-3xl font-bold"></span>
                <span id="prodOldPrice" class="text-gray-400 line-through"></span>
            </div>

            <div class="bg-red-50 p-4 rounded-lg border border-red-100">
                <p class="text-red-500 text-sm font-bold mb-2">Hurry up! Sale ends in:</p>
                <div class="flex gap-4 text-2xl font-mono font-bold text-red-600" id="saleTimer">
                    00 : 05 : 59 : 47
                </div>
            </div>

            <div class="space-y-2">
                <p class="text-xs font-medium">Only <span class="text-red-500 font-bold">9</span> item(s) left in stock!
                </p>
                <div class="w-full bg-gray-100 h-1.5 rounded-full overflow-hidden">
                    <div class="bg-red-500 h-full w-[15%] transition-all duration-1000"></div>
                </div>
            </div>

            <div class="space-y-4">
                <p class="font-bold text-sm">Size: <span id="selectedSize">M</span></p>
                <div class="flex gap-2">
                    <button onclick="selectSize('M')"
                        class="size-btn w-12 h-12 border-2 border-black rounded flex items-center justify-center font-bold">M</button>
                    <button onclick="selectSize('L')"
                        class="size-btn w-12 h-12 border border-gray-200 rounded flex items-center justify-center hover:border-black">L</button>
                    <button onclick="selectSize('XL')"
                        class="size-btn w-12 h-12 border border-gray-200 rounded flex items-center justify-center hover:border-black">XL</button>
                </div>
            </div>

            <div class="flex gap-4">
                <div class="flex border-2 border-gray-100 rounded-lg overflow-hidden">
                    <button onclick="changeQty(-1)" class="px-4 py-3 hover:bg-gray-50">-</button>
                    <input type="text" id="qty" value="1" class="w-12 text-center font-bold outline-none" readonly>
                    <button onclick="changeQty(1)" class="px-4 py-3 hover:bg-gray-50">+</button>
                </div>
                <button onclick="addToCart()"
                    class="flex-1 bg-black text-white rounded-lg font-bold hover:bg-gray-800 transition shadow-xl">Add
                    to cart</button>
            </div>
        </div>
    </section>
    <div id="cartDrawer" class="fixed inset-0 z-50 invisible transition-all duration-300">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="toggleCart()"></div>

        <div id="cartContent"
            class="absolute right-0 top-0 h-full w-full max-w-md bg-white p-8 shadow-2xl transform translate-x-full transition-transform duration-300 flex flex-col">

            <div class="flex justify-between items-center mb-10">
                <h2 class="text-2xl font-bold">Shopping Cart</h2>
                <button onclick="toggleCart()" class="text-2xl hover:text-red-500">&times;</button>
            </div>

            <div id="cartItemsList" class="space-y-6 overflow-y-auto flex-1 pr-2">
                <p class="text-center text-gray-400 mt-10">Your cart is empty</p>
            </div>

            <div class="border-t pt-6 mt-auto">
                <div class="flex justify-between text-lg font-bold mb-6">
                    <span>Subtotal</span>
                    <span id="cartSubtotal">$0.00</span>
                </div>
                <button
                    class="w-full bg-black text-white py-4 rounded-lg font-bold hover:bg-gray-900 transition active:scale-95">
                    Checkout
                </button>
                <button class="w-full text-center mt-4 text-sm underline hover:text-gray-600">
                    View Cart
                </button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-10 right-10 flex flex-col gap-4">
        <button onclick="toggleCart()"
            class="relative bg-black text-white p-4 rounded-full shadow-2xl hover:scale-110 transition group">
            <span id="cartCount"
                class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold hidden">0</span>

            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z">
                </path>
            </svg>
        </button>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const productData = JSON.parse(localStorage.getItem('selectedProduct'));

            if (productData) {
                document.getElementById('prodName').innerText = productData.name;
                document.getElementById('prodPrice').innerText = productData.price;
                document.getElementById('prodOldPrice').innerText = productData.oldPrice || '';
                document.getElementById('prodBrand').innerText = productData.brand;
                document.getElementById('prodReviews').innerText = `(${productData.rating})`;
                document.getElementById('mainImage').src = productData.image;

                document.title = productData.name + " - FASCO";
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const productData = JSON.parse(localStorage.getItem('selectedProduct'));

            if (productData) {
                document.getElementById('prodName').innerText = productData.name;
                document.getElementById('prodPrice').innerText = productData.price;
                document.getElementById('prodOldPrice').innerText = productData.oldPrice || '';
                document.getElementById('prodBrand').innerText = productData.brand;
                document.getElementById('prodReviews').innerText = `(${productData.rating})`;
                document.getElementById('mainImage').src = productData.image;

                document.title = productData.name + " - FASCO";
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
    <script>
        function addToCart() {

            const productData = JSON.parse(localStorage.getItem('selectedProduct'));
            const product = {
                id: productData.id,
                name: document.getElementById('prodName').innerText,
                price: document.getElementById('prodPrice').innerText,
                image: document.getElementById('mainImage').src,
                qty: parseInt(document.getElementById('qty').value) || 1,
                size: document.getElementById('selectedSize')?.innerText || 'M'
            };

            let cart = JSON.parse(localStorage.getItem('myCart'));

            if (!Array.isArray(cart)) cart = []; // حماية

            const existing = cart.find(
                item => item.id === product.id && item.size === product.size
            );

            if (existing) {
                existing.qty += product.qty;
            } else {
                cart.push(product);
            }

            localStorage.setItem('myCart', JSON.stringify(cart));

            renderCart();
            toggleCart();
        }
        function toggleCart() {
            const drawer = document.getElementById("cartDrawer");
            const content = document.getElementById("cartContent");
            drawer.classList.toggle("invisible");
            content.classList.toggle("translate-x-full");
        }
        document.addEventListener('DOMContentLoaded', () => {
            renderCart();
        });

        function renderCart() {
            const listContainer = document.getElementById('cartItemsList');
            const subtotalDisplay = document.getElementById('cartSubtotal');
            const cartCount = document.getElementById('cartCount');

            let cart = JSON.parse(localStorage.getItem('myCart')) || [];

            if (cartCount) {
                if (cart.length > 0) {
                    cartCount.innerText = cart.length;
                    cartCount.classList.remove('hidden');
                } else {
                    cartCount.classList.add('hidden');
                }
            }

            if (!listContainer) return;

            if (cart.length === 0) {
                listContainer.innerHTML = '<p class="text-center text-gray-400 mt-10">Your cart is empty</p>';
                if (subtotalDisplay) subtotalDisplay.innerText = '$0.00';
                return;
            }

            listContainer.innerHTML = '';
            let total = 0;

            cart.forEach((item, index) => {
                const price = parseFloat(item.price.replace('$', ''));
                total += price * item.qty;

                listContainer.innerHTML += `
            <div class="flex gap-4 border-b pb-4">
                <img src="${item.image}" class="w-20 h-24 object-cover rounded-lg" />
                <div class="flex-1">
                    <div class="flex justify-between">
                        <h4 class="font-bold text-sm">${item.name}</h4>
                        <button onclick="removeFromCart(${index})" class="text-red-500">&times;</button>
                    </div>
                    <p class="text-[10px] text-gray-400">Size: ${item.size}</p>
                    <div class="flex items-center justify-between mt-2">
                        <div class="flex border rounded overflow-hidden scale-75 origin-left">
                            <button onclick="updateQty(${index}, -1)" class="px-2 py-1 hover:bg-gray-100">-</button>
                            <span class="px-3 py-1 font-bold">${item.qty}</span>
                            <button onclick="updateQty(${index}, 1)" class="px-2 py-1 hover:bg-gray-100">+</button>
                        </div>
                        <span class="font-bold text-sm">$${(price * item.qty).toFixed(2)}</span>
                    </div>
                </div>
            </div>
        `;
            });

            if (subtotalDisplay) subtotalDisplay.innerText = `$${total.toFixed(2)}`;
        }
        function updateQty(index, change) {
            let cart = JSON.parse(localStorage.getItem('myCart')) || [];

            cart[index].qty += change;

            if (cart[index].qty <= 0) {
                cart.splice(index, 1);
            }

            localStorage.setItem('myCart', JSON.stringify(cart));
            renderCart();
        }

        function removeFromCart(index) {
            let cart = JSON.parse(localStorage.getItem('myCart')) || [];

            cart.splice(index, 1);

            localStorage.setItem('myCart', JSON.stringify(cart));
            renderCart();
        }
    </script>
</body>

</html>
