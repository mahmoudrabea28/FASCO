<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="min-h-screen flex items-center justify-center bg-gray-50 p-6">
    <div class="max-w-5xl w-full bg-white rounded-3xl overflow-hidden shadow-2xl flex flex-col md:flex-row">
        <div class="md:w-1/2 bg-pink-100">
            <img src="/images/freestocks-_3Q3tsJ01nc-unsplash.jpg" class="w-full h-full object-cover">
        </div>
        <div class="md:w-1/2 p-12 flex flex-col justify-center">
            <h2 class="text-4xl logo-font mb-2">FASCO</h2>
            <p class="text-gray-500 mb-8">Sign In To FASCO</p>
            
            <div class="flex gap-4 mb-8">
                <button class="flex-1 border border-gray-200 py-3 rounded-lg flex items-center justify-center gap-2 hover:bg-gray-50">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5"> Sign up with Google
                </button>
            </div>

            <div class="relative mb-8 text-center">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
                <span class="relative bg-white px-4 text-gray-400 text-sm italic">OR</span>
            </div>

            <form class="space-y-4">
                <input type="email" placeholder="Email" class="w-full border-b border-gray-200 py-3 outline-none focus:border-black transition">
                <input type="password" placeholder="Password" class="w-full border-b border-gray-200 py-3 outline-none focus:border-black transition">
                <button class="w-full bg-black text-white py-4 rounded-xl font-bold mt-6 shadow-lg">Sign In</button>
                <div class="flex justify-between mt-4 text-sm">
                    <button onclick="goToRegister()" type="button" class="border border-black px-4 py-2 rounded-lg">Register Now</button>
                    <a href="#" class="text-blue-600 underline">Forget Password?</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function goToRegister() {
        window.location.href = "signup.html";
    }
</script>
</body>
</html>
